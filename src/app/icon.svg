<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#16a34a"/>
  <g stroke="white" stroke-width="2" stroke-linecap="round" fill="none">
    <!-- Fence pickets -->
    <rect x="6" y="6" width="4" height="20" rx="1" fill="white" stroke="none"/>
    <rect x="14" y="6" width="4" height="20" rx="1" fill="white" stroke="none"/>
    <rect x="22" y="6" width="4" height="20" rx="1" fill="white" stroke="none"/>
    <!-- Horizontal rails -->
    <line x1="5" y1="12" x2="27" y2="12" stroke="white" stroke-width="2.5"/>
    <line x1="5" y1="20" x2="27" y2="20" stroke="white" stroke-width="2.5"/>
    <!-- Pointed tops -->
    <polygon points="6,6 8,3 10,6" fill="white" stroke="none"/>
    <polygon points="14,6 16,3 18,6" fill="white" stroke="none"/>
    <polygon points="22,6 24,3 26,6" fill="white" stroke="none"/>
  </g>
</svg>
